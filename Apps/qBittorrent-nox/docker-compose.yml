name: qbittorrent_nox
services:
  qbittorrent-nox:
    image: qbittorrentofficial/qbittorrent-nox:4.6.7
    container_name: qbittorrent-nox
    restart: unless-stopped
    environment:
      TZ: $TZ
      QBT_WEBUI_PORT: 8080
    ports:
      - target: 8080
        published: "8088"
        protocol: tcp
      - target: 6881
        published: "6881"
        protocol: tcp
      - target: 6881
        published: "6881"
        protocol: udp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/config
        target: /config
      - type: bind
        source: /DATA/Downloads
        target: /downloads
x-casaos:
  architectures: [amd64, arm64]
  main: qbittorrent-nox
  author: AdultOS AppStore
  category: Downloader
  developer: qBittorrent
  title: { en_US: qBittorrent-nox }
  tagline:
    en_US: Preferred torrent downloader for headless media stacks.
  description:
    en_US: |
      qBittorrent-nox provides a lightweight headless torrent client with a web UI, ideal for Arr integrations and seedbox-style automation.

      Best for: reliable torrent downloads in scripted workflows.
      Pairs well with: Prowlarr, Whisparr, Sonarr, Radarr, Lidarr, Sportarr.
      Role: Core.
  port_map: "8088"
  index: /
