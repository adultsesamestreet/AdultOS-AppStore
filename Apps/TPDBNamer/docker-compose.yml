name: tpdb_namer
services:
  tpdb-namer:
    image: ghcr.io/theporndatabase/tpdb-namer:latest
    container_name: tpdb-namer
    restart: unless-stopped
    environment:
      TZ: $TZ
      TPDB_API_KEY: ""
    ports:
      - target: 8080
        published: "8787"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/config
        target: /config
      - type: bind
        source: /DATA/Downloads
        target: /watch
      - type: bind
        source: /DATA/Media
        target: /output
x-casaos:
  architectures: [amd64]
  main: tpdb-namer
  author: AdultOS AppStore
  category: Media
  developer: ThePornDB
  icon: https://theporndb.net/img/logo.png
  title:
    en_US: TPDB Namer
  tagline:
    en_US: Pre-library ingest and renaming layer for adult media libraries.
  description:
    en_US: |
      TPDB Namer watches incoming files, matches scenes, renames and tags output, and can generate NFO/artwork before content lands in your library.

      Best for: pre-library cleanup and metadata-ready naming.
      Pairs well with: Whisparr, Stash, Jellyfin, tinyMediaManager (TPDB Edition).
      Role: Core.
  port_map: "8787"
  index: /
