<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" id="jellyfin-neon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neon glow filter -->
    <filter id="neonglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Neon pink to green gradient -->
    <linearGradient id="neonGradient" gradientUnits="userSpaceOnUse" x1="110.25" y1="213.3" x2="496.14" y2="436.09">
      <stop offset="0" stop-color="#FF00FF"/>
      <stop offset="0.12" stop-color="#FF1493"/>
      <stop offset="0.55" stop-color="#F6F250"/>
      <stop offset="0.85" stop-color="#00FFAA"/>
      <stop offset="0.95" stop-color="#33D5FB"/> 
    </linearGradient>

    <!-- Rounded square clip for dark background -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Dark rounded background (transparent corners) -->
  <rect 
    x="0" y="0" width="512" height="512" 
    rx="108" ry="108" 
    fill="#0A0A0F" 
    clip-path="url(#roundedClip)" />

  <!-- Scaled Jellyfin logo (65%) centered -->
  <g id="logo" transform="translate(256,256) scale(0.65) translate(-256,-256)">
    <!-- Outer shape -->
    <path 
      id="outer-shape" 
      d="M256,23.3c-61.6,0-259.8,359.4-229.6,420.1s429.3,60,459.2,0S317.6,23.3,256,23.3z
         M406.5,390.8c-19.6,39.3-281.1,39.8-300.9,0s110.1-275.3,150.4-275.3S426.1,351.4,406.5,390.8z" 
      fill="url(#neonGradient)" 
      filter="url(#neonglow)"/>

    <!-- Inner shape -->
    <path 
      id="inner-shape" 
      d="M256,201.6c-20.4,0-86.2,119.3-76.2,139.4s142.5,19.9,152.4,0S276.5,201.6,256,201.6z" 
      fill="url(#neonGradient)" 
      filter="url(#neonglow)"/>
  </g>
</svg>
