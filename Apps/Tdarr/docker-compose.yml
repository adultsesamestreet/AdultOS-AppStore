name: tdarr
services:
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:2.38.01
    container_name: tdarr
    restart: unless-stopped
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
      serverIP: 0.0.0.0
      serverPort: 8266
      webUIPort: 8265
      internalNode: "true"
    ports:
      - target: 8265
        published: "8265"
        protocol: tcp
      - target: 8266
        published: "8266"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/server
        target: /app/server
      - type: bind
        source: /DATA/AppData/$AppID/configs
        target: /app/configs
      - type: bind
        source: /DATA/AppData/$AppID/logs
        target: /app/logs
      - type: bind
        source: /DATA/Media
        target: /media
x-casaos:
  architectures: [amd64, arm64]
  main: tdarr
  author: AdultOS AppStore
  category: Media
  developer: Tdarr
  title: { en_US: Tdarr }
  tagline:
    en_US: Primary remux/transcode automation engine for large libraries.
  description:
    en_US: |
      Tdarr automates file processing at scale across your media library, including remux and transcode workflows with hardware acceleration.

      Remux: container changes without re-encoding.
      Transcode: codec/quality conversion with re-encoding.

      Best for: high-volume optimization pipelines.
      Pairs well with: Jellyfin, Tunarr, Stash.
      Role: Advanced.
  port_map: "8265"
  index: /
